<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learning - AZKO LOTTE MALL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/widgets.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-panel">
      <header id="topnav"></header>
      <main class="page-content">
        <section class="dashboard-hero card mb-4">
          <div class="row align-items-center g-4">
            <div class="col-xl-12">
              <div class="eyebrow">Learning</div>
              <h1 id="learningHeroTitle">E-Learning Center</h1>
              <p class="hero-copy" id="learningHeroDescription">Tempat untuk menampilkan materi belajar, informasi program pelatihan, dan media pendukung yang dapat diperbarui oleh admin.</p>
            </div>
          </div>
        </section>

        <section class="card p-4 mb-4">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
              <h3 class="mb-2">E-Learning</h3>
              <p class="text-muted mb-0">Admin dapat menambahkan, mengedit, atau menghapus postingan materi belajar tanpa menghapus semua konten.</p>
            </div>
            <div id="learningAdminControls" class="d-none">
              <div class="border rounded-3 p-3 bg-light">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <strong>Kelola E-Learning</strong>
                  <button id="newLearningPostBtn" class="btn btn-outline-secondary btn-sm" type="button">Buat Postingan Baru</button>
                </div>
                <label class="form-label">Judul halaman</label>
                <input id="learningHeroTitleInput" class="form-control mb-3" type="text">
                <label class="form-label">Deskripsi halaman</label>
                <textarea id="learningHeroDescriptionInput" class="form-control mb-3" rows="3"></textarea>
                <input id="learningPostId" type="hidden">
                <label class="form-label">Judul posting</label>
                <input id="learningTitleInput" class="form-control mb-3" type="text">
                <label class="form-label">Materi / Informasi</label>
                <textarea id="learningMaterialInput" class="form-control mb-3" rows="5"></textarea>
                <label class="form-label">Unggah gambar (opsional)</label>
                <input id="learningImageInput" class="form-control mb-3" type="file" accept="image/*">
                <div class="d-flex gap-2 flex-wrap">
                  <button id="saveLearningContentBtn" class="btn btn-danger btn-sm" type="button">Simpan Postingan</button>
                  <button id="resetLearningContentBtn" class="btn btn-outline-secondary btn-sm" type="button">Reset Form</button>
                </div>
              </div>
            </div>
          </div>

          <div id="learningPostsList"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api-storage.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/learning.js"></script>
</body>
</html>
