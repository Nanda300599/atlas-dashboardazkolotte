<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Info Promo - AZKO LOTTE MALL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="stylesheet" href="assets/css/widgets.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="main-panel">
      <header id="topnav"></header>
      <main class="page-content">
        <section class="dashboard-hero card mb-4">
          <div class="row align-items-center g-4">
            <div class="col-xl-12">
              <div class="eyebrow">Info Promo</div>
              <h1>Promo Insentif & Promo Departemen</h1>
              <p class="hero-copy">Kelola promo yang akan ditampilkan untuk tim, termasuk upload foto promo yang langsung muncul di halaman.</p>
            </div>
          </div>
        </section>

        <section class="card p-4 mb-4">
          <div id="promoAdminControls" class="d-none mb-4 border rounded-3 p-3 bg-light">
            <h5 class="mb-3">Kelola Postingan Promo</h5>
            <div class="row g-4">
              <div class="col-lg-6">
                <div class="border rounded-3 p-3 h-100">
                  <h6 class="fw-semibold mb-3">Promo Insentif</h6>
                  <div class="mb-3">
                    <label class="form-label">Judul</label>
                    <input id="promoIncentiveTitleInput" class="form-control" type="text" placeholder="Contoh: Promo Mingguan">
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="promoIncentiveDescriptionInput" class="form-control" rows="3" placeholder="Detail promo atau ketentuan"></textarea>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input id="promoIncentiveImageInput" class="form-control" type="file" accept="image/*">
                  </div>
                  <input id="promoIncentivePostId" type="hidden">
                  <div class="d-flex gap-2 flex-wrap">
                    <button id="newPromoIncentiveBtn" class="btn btn-outline-secondary btn-sm" type="button">Posting Baru</button>
                    <button id="savePromoIncentiveBtn" class="btn btn-danger btn-sm" type="button">Simpan</button>
                    <button id="cancelPromoIncentiveBtn" class="btn btn-outline-secondary btn-sm" type="button">Batal</button>
                  </div>
                </div>
              </div>
              <div class="col-lg-6">
                <div class="border rounded-3 p-3 h-100">
                  <h6 class="fw-semibold mb-3">Promo Departemen</h6>
                  <div class="mb-3">
                    <label class="form-label">Judul</label>
                    <input id="promoDepartmentTitleInput" class="form-control" type="text" placeholder="Contoh: Promo Store">
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="promoDepartmentDescriptionInput" class="form-control" rows="3" placeholder="Detail promo departemen"></textarea>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input id="promoDepartmentImageInput" class="form-control" type="file" accept="image/*">
                  </div>
                  <input id="promoDepartmentPostId" type="hidden">
                  <div class="d-flex gap-2 flex-wrap">
                    <button id="newPromoDepartmentBtn" class="btn btn-outline-secondary btn-sm" type="button">Posting Baru</button>
                    <button id="savePromoDepartmentBtn" class="btn btn-danger btn-sm" type="button">Simpan</button>
                    <button id="cancelPromoDepartmentBtn" class="btn btn-outline-secondary btn-sm" type="button">Batal</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="mt-3">
              <button id="resetPromoBtn" class="btn btn-outline-secondary btn-sm" type="button">Reset Semua Postingan</button>
            </div>
          </div>

          <div class="row g-4">
            <div class="col-lg-6">
              <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h4 class="mb-0">Promo Insentif</h4>
                </div>
                <div id="promoIncentiveList" class="promo-post-list"></div>
              </div>
            </div>
            <div class="col-lg-6">
              <div class="card h-100 p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h4 class="mb-0">Promo Departemen</h4>
                </div>
                <div id="promoDepartmentList" class="promo-post-list"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api-storage.js"></script>
  <script src="assets/js/dashboard.js"></script>
  <script src="assets/js/promo.js"></script>
</body>
</html>
