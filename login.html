<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - AZKO LOTTE MALL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div class="login-shell">
    <section class="login-hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1>Dashboard Performance</h1>
        <p>AZKO LOTTE MALL</p>
        <span>Salam 1 Komando, Make it Happen.</span>
      </div>
    </section>

    <section class="login-panel">
      <div class="login-card">
        <div class="text-center mb-4">
          <div class="brand-badge">STORE MANAGEMENT SYSTEM</div>
          <h3 class="mb-2">Welcome to Dashboard</h3>
          <p class="text-muted">Monitor sales, KPI, operational performance and business insights.</p>
        </div>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">User ID</label>
            <input id="username" class="form-control" placeholder="Username@azkolotte.id" required>
          </div>
          <div class="mb-3 position-relative">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <input id="password" type="password" class="form-control" placeholder="Enter your password" required>
              <button id="togglePwd" class="btn btn-outline-secondary" type="button" title="Show/Hide"><i class="fa fa-eye"></i></button>
            </div>
          </div>
          <div class="mb-4 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input id="remember" class="form-check-input" type="checkbox">
              <label class="form-check-label" for="remember">Remember this device</label>
            </div>
          </div>
          <div class="d-grid">
            <button class="btn btn-primary" id="loginBtn" type="submit">Access Dashboard</button>
          </div>
        </form>
        <div class="login-footer mt-4 text-center">
          <p class="footer-line">Authorized Personnel Only</p>
          <p class="footer-line brand-line">AZKO LOTTE MALL</p>
        </div>
      </div>
    </section>
  </div>

  <div class="auth-loading" id="authLoading" aria-hidden="true">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <h5>Preparing your workspace</h5>
      <p>Connecting your performance dashboard…</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
